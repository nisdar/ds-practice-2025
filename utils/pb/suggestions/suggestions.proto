syntax = "proto3";

package suggestions;

import "google/protobuf/empty.proto";


service SuggestionsService {
    rpc SuggestBooks (SuggestionRequest) returns (SuggestionResponse);
    rpc SuggestBooksNew (OrderInfo) returns (OrderResponse);
    rpc InitSuggestions (OrderData) returns (google.protobuf.Empty);
}


message SuggestionRequest {
    string card_number = 1;
    float order_amount = 2;
}

message SuggestionResponse {
    repeated Book books = 1;
}





message CreditCard {
    string number = 1;
    string expirationDate = 2;
    string cvv = 3;
}

message BillingAddress {
    string street = 1;
    string city = 2;
    string state = 3;
    string zip = 4;
    string country = 5;
}

message User {
    string name = 1;
    string contact = 2;
}

message OrderInfo {
    string id = 1;
    VectorClock vectorClock = 2;
}

message ItemData {
    string name = 1;
    string quantity = 2;
}

message OrderData {
    string orderId = 1;
    repeated ItemData items = 2;
    User user = 3;
    CreditCard creditCard = 4;
    Comment comment = 5;
    BillingAddress billingAddress = 6;
    string shippingMethod = 7;
    bool giftWrapping = 8;
    bool termsAccepted = 9;
}

message VectorClock {
    repeated int32 timeStamp = 1;
}

message Book {
    string id = 1;
    string author = 2;
    string title = 3;
}

message Comment {
    string comment = 1;
}

message ClearDataResponse {
}

message OrderResponse {
    VectorClock vectorClock = 1;
    bool success = 2;
    repeated Book suggestions = 3;
}





service HelloService {
    rpc SayHello (HelloRequest) returns (HelloResponse);
}

message HelloRequest {
    string name = 1;
}

message HelloResponse {
    string greeting = 1;
}
