syntax = "proto3";

package executor;

service ExecutorService {
    rpc StartLeaderElection (LeaderElectionRequest) returns (LeaderElectionResponse);
    rpc ElectLeader (LeaderElectionRequest) returns (LeaderElectionResponse);
    rpc AnnounceLeader (LeaderAnnouncementRequest) returns (LeaderAnnouncementResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}

message LeaderElectionRequest {
    repeated int32 executors_ids = 1;
    bool finished = 2;
}
message LeaderAnnouncementRequest {
    int32 leader_id = 1;
    bool finished = 2;
}

message LeaderElectionResponse {
    repeated int32 executors_ids = 1;
    bool finished = 2;
}
message LeaderAnnouncementResponse {
    int32 leader_id = 1;
    bool finished = 2;
}

message HeartbeatRequest {
    int32 leader_id = 1;
}
message HeartbeatResponse {
    bool acknowledged = 1;
}

service HelloService {
    rpc SayHello (HelloRequest) returns (HelloResponse);
}

message HelloRequest {
    string name = 1;
}

message HelloResponse {
    string greeting = 1;
}