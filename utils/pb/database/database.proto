syntax = "proto3";

package database;

import "google/protobuf/empty.proto";

service DatabaseService {
    rpc Read (ReadRequest) returns (ReadResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc Delete (DeleteRequest) returns (DeleteResponse);
    rpc GetAll (GetAllRequest) returns (GetAllResponse);
    rpc Sync(google.protobuf.Empty) returns (GetAllResponse);
    rpc PrepareUpdate (PrepareRequest) returns (PrepareResponse);
    rpc CommitUpdate (CommitRequest) returns (CommitResponse);
    rpc AbortUpdate (AbortRequest) returns (AbortResponse);
}

message Book {
    string id = 1;
    string title = 2;
    string author = 3;
    int32 stock = 4;
    float price = 5;
}

message ReadRequest {
    string book_id = 1;
}

message ReadResponse {
    int32 stock = 1;
}

message WriteRequest {
    Book book = 1;
}

message WriteResponse {
    bool success = 1;
}

message DeleteRequest {
    string id = 1;
}
message DeleteResponse {
    bool success = 1;
}

message GetAllRequest {}
message GetAllResponse {
    repeated Book books = 1;
}


message PrepareRequest {
    string updateId = 1;
    Book book = 2;
}

message PrepareResponse {
    bool ready = 1;
}

message CommitRequest {
    string updateId = 1;
}

message CommitResponse {
    bool success = 1;
}

message AbortRequest {
    string updateId = 1;
}

message AbortResponse {
    bool aborted = 1;
}

service HelloService {
    rpc SayHello (HelloRequest) returns (HelloResponse);
}

message HelloRequest {
    string name = 1;
}

message HelloResponse {
    string greeting = 1;
}